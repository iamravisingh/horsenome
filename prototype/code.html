</div>

<div>

<div class="relative w-[800px] h-[800px] organic-wave flex items-center justify-center">

<path d="M44.7,-76.4C58.1,-69.2,69.5,-57.4,77.3,-43.8C85.1,-30.2,89.3,-15.1,89.7,0.2C90.1,15.5,86.6,31,78.8,44.6C71.1,58.1,59,69.7,45.3,77.4C31.5,85.1,15.8,88.9,0.2,88.6C-15.4,88.3,-30.7,83.9,-44.6,76.2C-58.4,68.4,-70.7,57.3,-78.9,43.8C-87.1,30.3,-91.1,14.5,-90.4,-1.2C-89.8,-16.9,-84.5,-32.5,-75.6,-45.8C-66.6,-59.1,-54.1,-70.1,-39.9,-76.8C-25.7,-83.4,-9.8,-85.7,3.5,-91.7C16.8,-97.7,31.3,-83.5,44.7,-76.4Z" fill="currentColor" transform="translate(100 100)"></path>

<div class="text-center">
<span class="block font-headline text-[120px] font-extrabold tracking-tighter text-on-surface leading-none">108</span>
<span class="block font-label text-sm uppercase tracking-[0.2em] text-outline mt-2">Beats Per Minute</span>
</div>
<!-- Interaction Core -->
<div class="w-full flex flex-col items-center gap-10">
<!-- Play/Stop Pulsing Button -->
<button class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-white shadow-2xl hover:scale-105 active:scale-95 transition-all duration-300 group">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<!-- Tempo Slider -->
<div class="w-full px-12 group">
<div class="relative h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="absolute left-0 top-0 h-full bg-primary w-[45%]"></div>
</div>
<div class="relative w-full -mt-4">
<div class="absolute left-[45%] -ml-3 w-6 h-6 bg-surface-container-lowest border-2 border-outline rounded-full cursor-grab active:cursor-grabbing shadow-sm"></div>
</div>
</div>
<!-- Beat Selection Chips -->
<div class="flex items-center gap-3">
<button class="px-6 py-2 rounded-full bg-primary-container text-on-primary-container font-headline font-bold text-sm transition-all">4/4</button>
<button class="px-6 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-headline font-medium text-sm hover:bg-surface-container-high transition-all">3/4</button>
<button class="px-6 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-headline font-medium text-sm hover:bg-surface-container-high transition-all">6/8</button>
<button class="px-6 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-headline font-medium text-sm hover:bg-surface-container-high transition-all">2/4</button>
</div>
</div>
<!-- Sub-controls -->
<div class="flex items-center gap-8 mt-4">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-outline">volume_up</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">Volume</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary">vibration</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Haptic</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-outline">timer</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-outline">Timer</span>
</div>
</div>
</div>
<!-- Floating Decorative Waveform (Glassmorphism) -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 w-[80%] h-32 bg-surface/30 backdrop-blur-xl rounded-[2rem] overflow-hidden flex items-end justify-center px-12 pb-6">
